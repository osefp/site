<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --fg: #f0ece3;
      --accent: #c8a96e;
      --muted: #3a3a3a;
      --dim: #7a7570;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.35;
    }

    /* Decorative circle */
    .circle {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      animation: expand 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .circle-2 {
      width: 900px;
      height: 900px;
      border-color: #222;
      animation-delay: 0.4s;
    }

    @keyframes expand {
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      opacity: 0;
      animation: fadein 0.8s ease 1s forwards;
    }
    .corner-tl { top: 32px; left: 32px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner-tr { top: 32px; right: 32px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner-bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner-br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    @keyframes fadein {
      to { opacity: 1; }
    }

    /* Main content */
    .content {
      text-align: center;
      z-index: 2;
      position: relative;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.8s ease 0.5s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin: 0.3em 0 0.2em;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s ease 0.65s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .sub {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.8s ease 0.85s forwards;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 2.5rem auto;
      opacity: 0;
      animation: fadein 0.8s ease 1.1s forwards;
    }

    nav {
      display: flex;
      gap: 2.5rem;
      opacity: 0;
      animation: rise 0.8s ease 1.2s forwards;
    }

    nav a {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.25s;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    nav a:hover { color: var(--fg); }
    nav a:hover::after { width: 100%; }

    /* Date stamp */
    .stamp {
      position: fixed;
      bottom: 36px;
      right: 40px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0;
      animation: fadein 0.8s ease 1.4s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle circle-2"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <main class="content">
    <p class="label">Welcome</p>
    <h1>Hello,<br /><em>OSEFP</em></h1>
    
    <div class="divider"></div>
    <nav>
      <a href="#"></a>
    </nav>
  </main>

  <p class="stamp" id="stamp"></p>

  <script>
    const d = new Date();
    document.getElementById('stamp').textContent =
      d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
  </script>
</body>
</html>
